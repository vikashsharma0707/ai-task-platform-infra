apiVersion: apps/v1
kind: Deployment

metadata:
  name: mongodb
  namespace: ai-platform

spec:

  replicas: 1

  selector:
    matchLabels:
      app: mongodb

  template:

    metadata:
      labels:
        app: mongodb

    spec:

      containers:

      - name: mongodb

        image: mongo:7

        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 27017

        volumeMounts:

        - name: mongo-storage
          mountPath: /data/db

        resources:

          requests:
            cpu: "200m"
            memory: "256Mi"

          limits:
            cpu: "500m"
            memory: "512Mi"

        livenessProbe:

          tcpSocket:
            port: 27017

          initialDelaySeconds: 30
          periodSeconds: 10

        readinessProbe:

          tcpSocket:
            port: 27017

          initialDelaySeconds: 10
          periodSeconds: 5

      volumes:

      - name: mongo-storage

        persistentVolumeClaim:

          claimName: mongodb-pvc