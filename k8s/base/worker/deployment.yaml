apiVersion: apps/v1
kind: Deployment

metadata:
  name: worker
  namespace: ai-platform

spec:
  replicas: 2

  selector:
    matchLabels:
      app: worker

  template:
    metadata:
      labels:
        app: worker

    spec:
      containers:
        - name: worker
          image: vikashsharma0707/ai-task-platform-worker:latest
          imagePullPolicy: Always

          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: MONGO_URI

            - name: APP_REDIS_HOST
              value: redis

            - name: APP_REDIS_PORT
              value: "6379"

            - name: REDIS_PASSWORD
              value: ""

            - name: QUEUE_NAME
              value: tasks

            - name: WORKER_CONCURRENCY
              value: "4"

          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"